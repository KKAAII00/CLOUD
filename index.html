<!DOCTYPE html>
<html>
<head>
<title>3D Gaming Laptop Showroom PRO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* UI */
#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 10;
  color: white;
}

button {
  display: block;
  margin: 8px 0;
  padding: 10px;
  width: 160px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.msi { background: red; color: white; }
.rog { background: cyan; color: black; }
.alien { background: lime; color: black; }

/* SPEC BOX */
#spec {
  position: absolute;
  right: 20px;
  top: 20px;
  width: 280px;
  background: rgba(0,0,0,0.7);
  border: 1px solid red;
  padding: 12px;
  color: white;
  display: none;
}

h2 {
  margin: 0;
  color: red;
  text-shadow: 0 0 10px red;
}
</style>
</head>

<body>

<div id="ui">
  <h2>💻 Gaming Showroom PRO</h2>
  <button class="msi" onclick="focus('msi')">MSI Titan</button>
  <button class="rog" onclick="focus('rog')">ASUS ROG</button>
  <button class="alien" onclick="focus('alien')">Alienware</button>
</div>

<div id="spec"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 25);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,2,10);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHTS */
let light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

let glow1 = new THREE.PointLight(0xff0000, 2);
glow1.position.set(-5,2,2);
scene.add(glow1);

/* ===== REAL LAPTOP MODEL ===== */
function createLaptop(color, x){

  let group = new THREE.Group();

  /* BASE */
  let base = new THREE.Mesh(
    new THREE.BoxGeometry(3, 0.2, 2),
    new THREE.MeshStandardMaterial({
      color: 0x111111,
      emissive: color,
      emissiveIntensity: 0.2
    })
  );
  base.position.y = 0;
  group.add(base);

  /* SCREEN FRAME */
  let screenFrame = new THREE.Mesh(
    new THREE.BoxGeometry(3, 1.8, 0.1),
    new THREE.MeshStandardMaterial({
      color: 0x000000,
      emissive: color,
      emissiveIntensity: 0.3
    })
  );

  screenFrame.position.set(0, 1.2, -0.9);
  screenFrame.rotation.x = -0.25;
  group.add(screenFrame);

  /* DISPLAY (REAL SCREEN EFFECT) */
  let display = new THREE.Mesh(
    new THREE.PlaneGeometry(2.7, 1.5),
    new THREE.MeshBasicMaterial({ color: color })
  );

  display.position.set(0, 1.2, -0.85);
  display.rotation.x = -0.25;
  group.add(display);

  group.position.x = x;

  return { group, display };
}

/* LAPTOPS */
let MSI = createLaptop(0xff0000, -4);
let ROG = createLaptop(0x00ffff, 0);
let ALIEN = createLaptop(0x00ff00, 4);

scene.add(MSI.group);
scene.add(ROG.group);
scene.add(ALIEN.group);

/* SCREEN ANIMATION (FAKE OS UI EFFECT) */
let t = 0;

function animate(){
  requestAnimationFrame(animate);

  t += 0.02;

  MSI.group.rotation.y += 0.01;
  ROG.group.rotation.y += 0.01;
  ALIEN.group.rotation.y += 0.01;

  // RGB SCREEN EFFECT
  MSI.display.material.color.setHSL(Math.sin(t)*0.5+0.5, 1, 0.5);
  ROG.display.material.color.setHSL(Math.sin(t+2)*0.5+0.5, 1, 0.5);
  ALIEN.display.material.color.setHSL(Math.sin(t+4)*0.5+0.5, 1, 0.5);

  renderer.render(scene, camera);
}
animate();

/* CAMERA + SPEC CONTROL */
function focus(type){

  if(type === "msi"){
    camera.position.set(-4,2,8);
    showSpec("MSI Titan 18 HX AI","i9-14900HX","RTX 4090","64GB DDR5","2TB SSD","🔥 Ultimate Cooling + FPS Beast");
  }

  if(type === "rog"){
    camera.position.set(0,2,8);
    showSpec("ASUS ROG Scar 18","i9 HX","RTX 4090","32–64GB DDR5","2TB SSD","⚡ Balanced Gaming Power");
  }

  if(type === "alien"){
    camera.position.set(4,2,8);
    showSpec("Alienware m18","i9-13900HX","RTX 4080/4090","32GB DDR5","2TB SSD","👽 Premium Sci-Fi Design");
  }
}

/* SPEC PANEL */
function showSpec(name,cpu,gpu,ram,storage,note){
  let box = document.getElementById("spec");
  box.style.display = "block";

  box.innerHTML = `
    <h3>${name}</h3>
    <p><b>CPU:</b> ${cpu}</p>
    <p><b>GPU:</b> ${gpu}</p>
    <p><b>RAM:</b> ${ram}</p>
    <p><b>Storage:</b> ${storage}</p>
    <hr>
    <p>${note}</p>
  `;
}

/* RESIZE */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
