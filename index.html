<!DOCTYPE html>
<html>
<head>
  <title>3D Gaming Laptop Showcase</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial;
    }

    /* LEFT UI PANEL */
    #panel {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      width: 280px;
    }

    .card {
      background: rgba(255,0,0,0.08);
      border: 1px solid red;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px red;
    }

    h2 {
      color: red;
      text-shadow: 0 0 10px red;
    }

    button {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .msi { background: red; color: white; }
    .rog { background: cyan; color: black; }
    .alien { background: lime; color: black; }

    /* SPEC PANEL */
    #specBox {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 300px;
      background: rgba(0,0,0,0.7);
      border: 1px solid red;
      padding: 15px;
      color: white;
      border-radius: 10px;
      box-shadow: 0 0 20px red;
      display: none;
    }

    #specBox h3 {
      color: red;
      margin-top: 0;
    }

  </style>
</head>

<body>

<!-- UI PANEL -->
<div id="panel">
  <h2>💻 Gaming Laptops</h2>

  <button class="msi" onclick="showSpecs('msi')">MSI Titan</button>
  <button class="rog" onclick="showSpecs('rog')">ASUS ROG</button>
  <button class="alien" onclick="showSpecs('alien')">Alienware X16</button>

  <div class="card">
    Click a laptop to view full specs
  </div>
</div>

<!-- SPEC BOX -->
<div id="specBox"></div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 20);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 8;

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

// CREATE LAPTOP FUNCTION
function laptop(color, x) {
  let geo = new THREE.BoxGeometry(2.5, 0.2, 1.8);
  let mat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.5
  });

  let mesh = new THREE.Mesh(geo, mat);
  mesh.position.x = x;
  return mesh;
}

// LAPTOPS
let MSI = laptop(0xff0000, -4);
let ROG = laptop(0x00ffff, 0);
let ALIEN = laptop(0x00ff00, 4);

scene.add(MSI);
scene.add(ROG);
scene.add(ALIEN);

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  MSI.rotation.y += 0.01;
  ROG.rotation.y += 0.01;
  ALIEN.rotation.y += 0.01;

  renderer.render(scene, camera);
}
animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// SPEC DATABASE (REAL DETAIL)
const specs = {
  msi: {
    name: "MSI Titan GT77",
    cpu: "Intel i9-14900HX (24-Core)",
    gpu: "RTX 4090 16GB",
    ram: "64GB DDR5 6000MHz",
    storage: "2TB NVMe Gen4 SSD",
    display: "17.3\" 4K 144Hz",
    cooling: "Cooler Boost Titan",
    fps: "200–300 FPS (Ultra Settings)"
  },

  rog: {
    name: "ASUS ROG Strix Scar 18",
    cpu: "Intel i9-14900HX",
    gpu: "RTX 4090 16GB",
    ram: "32–64GB DDR5",
    storage: "2TB NVMe SSD",
    display: "18\" QHD+ 240Hz",
    cooling: "Tri-Fan + Liquid Metal",
    fps: "180–280 FPS"
  },

  alien: {
    name: "Alienware X16",
    cpu: "Intel i9-13900HK",
    gpu: "RTX 4080 / 4090",
    ram: "32GB DDR5",
    storage: "1–2TB SSD",
    display: "16\" QHD+ 240Hz",
    cooling: "Advanced Cryo-tech",
    fps: "160–250 FPS"
  }
};

// SHOW SPEC FUNCTION
function showSpecs(type){
  let s = specs[type];

  document.getElementById("specBox").style.display = "block";

  document.getElementById("specBox").innerHTML = `
    <h3>${s.name}</h3>
    <p><b>CPU:</b> ${s.cpu}</p>
    <p><b>GPU:</b> ${s.gpu}</p>
    <p><b>RAM:</b> ${s.ram}</p>
    <p><b>Storage:</b> ${s.storage}</p>
    <p><b>Display:</b> ${s.display}</p>
    <p><b>Cooling:</b> ${s.cooling}</p>
    <p><b>Performance:</b> ${s.fps}</p>
  `;
}
</script>

</body>
</html>
