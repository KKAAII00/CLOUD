<!DOCTYPE html>
<html>
<head>
  <title>Gaming Laptop Boot System</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle, #000, #111);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      overflow: hidden;
      color: white;
    }

    /* ===== BOOT SCREEN ===== */
    #bootScreen {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }

    .loader {
      width: 200px;
      height: 4px;
      background: #222;
      margin-top: 20px;
      overflow: hidden;
      border-radius: 5px;
    }

    .bar {
      width: 0%;
      height: 100%;
      background: cyan;
      animation: load 3s forwards;
    }

    @keyframes load {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    /* ===== SCENE ===== */
    .scene {
      perspective: 1000px;
    }

    /* ===== LAPTOP 3D ===== */
    .laptop {
      width: 320px;
      height: 200px;
      transform-style: preserve-3d;
      transform: rotateX(20deg) rotateY(0deg);
      animation: float 3s infinite ease-in-out;
      position: relative;
    }

    @keyframes float {
      0%, 100% { transform: rotateX(20deg) rotateY(-10deg); }
      50% { transform: rotateX(25deg) rotateY(10deg); }
    }

    /* SCREEN */
    .screen {
      width: 100%;
      height: 100%;
      background: #111;
      border-radius: 10px;
      box-shadow:
        0 0 20px cyan,
        0 0 40px magenta,
        0 0 60px blue;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      position: relative;
    }

    /* RGB glow border */
    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      border: 2px solid transparent;
      animation: rgb 3s linear infinite;
    }

    @keyframes rgb {
      0% { box-shadow: 0 0 10px red; }
      33% { box-shadow: 0 0 10px lime; }
      66% { box-shadow: 0 0 10px cyan; }
      100% { box-shadow: 0 0 10px red; }
    }

    /* KEYBOARD */
    .base {
      width: 100%;
      height: 80px;
      background: #222;
      position: absolute;
      bottom: -80px;
      border-radius: 10px;
      box-shadow: 0 0 20px purple;
    }

    /* ===== UI PANEL ===== */
    .ui {
      display: none;
      position: absolute;
      text-align: center;
    }

    .ui h1 {
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: cyan;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- BOOT SCREEN -->
<div id="bootScreen">
  <h1>BOOTING GAMING SYSTEM...</h1>
  <div class="loader"><div class="bar"></div></div>
</div>

<!-- MAIN SCENE -->
<div class="scene">

  <div class="laptop">
    <div class="screen">
      💻 GAMING LAPTOP ACTIVE
    </div>
    <div class="base"></div>
  </div>

</div>

<!-- UI -->
<div class="ui" id="ui">
  <h1>WELCOME PLAYER</h1>
  <p>RTX Gaming System Loaded</p>
  <button onclick="alert('Game Launching...')">Launch Game</button>
</div>

<!-- SOUND (optional mp3 file) -->
<audio id="bootSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
  // Boot animation
  setTimeout(() => {
    document.getElementById("bootScreen").style.display = "none";
    document.getElementById("ui").style.display = "block";

    // play sound
    document.getElementById("bootSound").play();

  }, 3000);
</script>

</body>
</html>
